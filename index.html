function renderApp(){
  const isAdmin = state.user.rol==="admin";
  $("#app").innerHTML = `
  <div id="appView" class="view active">
    <div class="topbar">
      <button class="menu-btn" id="menuBtn">${ICON.menu}</button>
      <div class="brand-mini"><span class="dot">S</span><span>Secu<span class="x">Docs</span></span></div>
      <div class="topbar-sp"></div>
      <div class="user-chip">
        <div class="meta"><b>${esc(state.user.nombre)}</b><small>${state.user.usuario}</small></div>
        <div class="av">${initials(state.user.nombre)}</div>
      </div>
    </div>
    <div class="shell">
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">
          <span class="dot" style="width:30px;height:30px;border-radius:9px;background:var(--grad-emerald);display:grid;place-items:center;color:#fff;font-weight:800">S</span>
          <b style="font-family:var(--display)">SecuDocs</b>
        </div>
        <div class="sec-lbl">Principal</div>
        <button class="nav-item ${state.view==='dashboard'?'active':''}" data-nav="dashboard">
          <span class="ni-ico">${ICON.grid}</span> Formularios
        </button>
        ${isAdmin?`
        <div class="sec-lbl">Administración</div>
        <button class="nav-item ${state.view==='users'?'active':''}" data-nav="users">
          <span class="ni-ico">${ICON.users}</span> Gestión de usuarios
        </button>`:''}
        <div class="sec-lbl">Sesión</div>
        <div class="nav-item" style="cursor:default">
          <span class="role-tag ${state.user.rol}">${state.user.rol==='admin'?'Administrador':'Seguridad'}</span>
        </div>
        <button class="nav-item danger" data-nav="logout">
          <span class="ni-ico">${ICON.logout}</span> Cerrar sesión
        </button>
      </aside>
      <div class="backdrop" id="backdrop"></div>
      <main class="main" id="main"></main>
    </div>
  </div>`;

  // navegación
  $$(".nav-item[data-nav]").forEach(b=>{
    b.onclick = ()=>{
      const nav=b.dataset.nav;
      if(nav==="logout"){ logout(); return; }
      closeSidebar();
      state.view=nav;
      if(nav==="dashboard") renderDashboard();
      if(nav==="users"){ stopRealtime(); renderUsers(); }
      // refrescar estado activo
      $$(".nav-item[data-nav]").forEach(x=>x.classList.toggle("active", x.dataset.nav===nav && nav!=="logout"));
    };
  });
  $("#menuBtn").onclick = ()=>{ $("#sidebar").classList.add("open"); $("#backdrop").classList.add("show"); };
  $("#backdrop").onclick = closeSidebar;

  if(state.view==="users" && isAdmin) renderUsers(); else { state.view="dashboard"; renderDashboard(); }
}
function closeSidebar(){ $("#sidebar")?.classList.remove("open"); $("#backdrop")?.classList.remove("show"); }
function logout(){ stopRealtime(); clearSession(); state.user=null; state.view="dashboard"; renderLogin(); }

/* ======================================================================
   RENDER: DASHBOARD (tarjetas de los 9 formularios)
   ====================================================================== */
async function renderDashboard(){
  stopRealtime(); // cierra listeners de vistas anteriores
  const main = $("#main");
  main.innerHTML = `
    <div class="page-head">
      <h2>Formularios de Seguridad ${state.demo?'':'<span class="live-badge" id="liveBadge" title="Actualización en tiempo real"><span class="live-dot"></span> En vivo</span>'}</h2>
      <p>Seleccioná un formulario para ver sus registros, crear nuevas boletas, firmar campos e imprimir en PDF.</p>
    </div>
    <div class="stat-strip" id="statStrip">
      <div class="loader-wrap" style="grid-column:1/-1;padding:24px"><div class="spinner"></div><p>Cargando estadísticas…</p></div>
    </div>
    <div class="grid-forms fade-list" id="gridForms"></div>`;

  const yr = new Date().getFullYear();

  const paint = (counts)=>{
    if(state.view!=="dashboard") return;
    const total = Object.values(counts).reduce((a,b)=>a+b,0);
    const ss = $("#statStrip");
    if(ss) ss.innerHTML = `
      <div class="stat"><div class="sv">${FORMS.length}</div><div class="sl">Formularios digitalizados</div></div>
      <div class="stat"><div class="sv">${total}</div><div class="sl">Registros totales</div></div>
      <div class="stat"><div class="sv">${yr}</div><div class="sl">Año en curso</div></div>
      <div class="stat"><div class="sv">${state.user.rol==='admin'?'Admin':'Seguridad'}</div><div class="sl">Tu nivel de acceso</div></div>`;

    const grid = $("#gridForms");
    if(!grid) return;
    grid.innerHTML = FORMS.map(f=>{
      const c = counts[f.id]||0;
      return `
      <div class="form-card" data-form="${f.id}" style="--accent:${ACCENTS[f.accent]}">
        <div class="fc-top">
          <div class="fc-icon" style="background:${ACCENTS[f.accent]}">${ICON[f.icon]||ICON.doc}</div>
          <span class="fc-code">${f.code}</span>
        </div>
        <h3>${esc(f.title)}</h3>
        <div class="fc-desc">${esc(f.desc)}</div>
        <span class="fc-emp dual"><img src="${LOGOS.byc}" alt="B&C"><img src="${LOGOS.bc}" alt="Bajo Cero"> ${esc(f.empresa)}</span>
        <div class="fc-foot">
          <span class="count">${ICON.hash.replace(/width="18" height="18"/,'width="14" height="14"')} <b>${c}</b> registro${c===1?'':'s'}</span>
          <span class="go">Abrir ${ICON.arrow}</span>
        </div>
      </div>`;
    }).join("");
    $$(".form-card").forEach(card=>{ card.onclick = ()=>openForm(card.dataset.form); });
  };

  if(state.demo){
    let counts={};
    try{ counts = await dbCountByForm(); }catch(e){ console.warn(e); }
    paint(counts);
  } else {
    // Carga inicial inmediata + suscripción en tiempo real
    let first = true;
    state.unsub.dashboard = subscribeCounts(counts=>{
      paint(counts);
      if(!first) flashLiveDot();
      first = false;
    });
    if(!state.unsub.dashboard){
      let counts={}; try{ counts = await dbCountByForm(); }catch(e){}
      paint(counts);
    }
  }
}
</script>

<script>
/* ======================================================================
   RENDER: REGISTROS DE UN FORMULARIO
   ====================================================================== */
async function openForm(formId){
  const form = FORM_BY_ID[formId];
  state.currentForm = form;
  state.view = "form:"+formId;
  const main = $("#main");
  main.innerHTML = `
    <button class="btn ghost sm" id="backDash" style="margin-bottom:16px">${ICON.arrow.replace('points="12 5 19 12 12 19"','points="12 19 5 12 12 5"').replace('x1="5" y1="12" x2="19"','x1="19" y1="12" x2="5"')} Volver a formularios</button>
    <div class="page-head">
      <h2><span class="fc-icon" style="width:40px;height:40px;border-radius:11px;background:${ACCENTS[form.accent]};display:inline-grid">${ICON[form.icon]||ICON.doc}</span> ${esc(form.title)} <span class="code-badge">${form.code}</span>${state.demo?'':'<span class="live-badge" id="liveBadge" title="Actualización en tiempo real"><span class="live-dot"></span> En vivo</span>'}</h2>
      <p>${esc(form.desc)} <br><b style="color:var(--ink-soft)">${esc(form.empresa)}</b> · ${esc(form.sistema)}</p>
      <div class="ph-logos"><img src="${LOGOS.byc}" alt="B&C Exportadores"><img src="${LOGOS.bc}" alt="Bajo Cero"></div>
    </div>
    ${form.instructions?`<div style="background:var(--surface);border:1px solid var(--line);border-left:3px solid var(--emerald-l);border-radius:12px;padding:12px 16px;margin-bottom:18px;font-size:13px;color:var(--ink-soft);line-height:1.5"><b>Instrucciones:</b> ${esc(form.instructions)}</div>`:''}
    <div class="toolbar">
      <div class="search-box">
        <span class="ico">${ICON.search}</span>
        <input id="recSearch" placeholder="Buscar por consecutivo, nombre, fecha…">
      </div>
      <button class="btn solid" id="newRec">${ICON.plus} Nueva boleta</button>
    </div>
    <div id="recList"><div class="loader-wrap"><div class="spinner"></div><p>Cargando registros…</p></div></div>`;

  $("#backDash").onclick = ()=>{ stopRealtime(); state.view="dashboard"; renderDashboard(); };
  $("#newRec").onclick = ()=>openEditor(form, null);
  $("#recSearch").addEventListener("input", e=>{ state.search=e.target.value.toLowerCase(); paintRecords(); });

  // El admin necesita los nombres de los creadores para la etiqueta
  if(state.user.rol==="admin"){ try{ await loadUserMap(); }catch(e){} }

  // Detener listeners previos antes de abrir este formulario
  stopRealtime();

  if(state.demo){
    // Modo demo: carga puntual; se refresca tras cada acción propia
    try{ state.records = await dbListRecords(formId); }
    catch(e){ console.error(e); state.records=[]; toast("No se pudieron cargar los registros","err"); }
    paintRecords();
  } else {
    // Tiempo real: la tabla se actualiza sola ante cualquier cambio
    let first = true;
    state.unsub.records = subscribeRecords(formId, arr=>{
      state.records = arr;
      // Solo repinta si seguimos en este formulario
      if(state.view === "form:"+formId){
        paintRecords();
        if(!first) flashLiveDot();
      }
      first = false;
    });
    if(!state.unsub.records){
      // fallback si por algún motivo no se pudo suscribir
      try{ state.records = await dbListRecords(formId); }catch(e){ state.records=[]; }
      paintRecords();
    }
  }
}

function paintRecords(){
  const form = state.currentForm;
  const cont = $("#recList");
  if(!cont) return;
  const q = state.search;
  const rows = state.records.filter(r=>{
    if(!q) return true;
    const hay = JSON.stringify(r.data||{}).toLowerCase()+" "+(r.consecutivo||"").toLowerCase();
    return hay.includes(q);
  });

  if(state.records.length===0){
    cont.innerHTML = `<div class="empty-state">
      <div class="es-ico">${ICON.doc}</div>
      <h3>Sin registros todavía</h3>
      <p>Creá la primera boleta de <b>${esc(form.title)}</b>. Se le asignará un consecutivo automático.</p>
      <button class="btn solid" onclick="openEditor(FORM_BY_ID['${form.id}'],null)">${ICON.plus} Crear primera boleta</button>
    </div>`;
    return;
  }
  if(rows.length===0){
    cont.innerHTML = `<div class="empty-state"><div class="es-ico">${ICON.search}</div><h3>Sin coincidencias</h3><p>No hay registros que coincidan con “${esc(q)}”.</p></div>`;
    return;
  }

  // columnas resumen: consecutivo, fecha, 2 campos clave, responsable, estado
  const summaryKeys = pickSummaryFields(form);
  const isAdmin = state.user.rol==="admin";
  const canDelete = isAdmin;

  cont.innerHTML = `<div class="table-wrap"><table class="tbl">
    <thead><tr>
      <th>Consecutivo</th>
      ${summaryKeys.map(k=>`<th class="${k.hideSm?'hide-sm':''}">${esc(k.label)}</th>`).join("")}
      ${isAdmin?'<th>Creado por</th>':''}
      <th>Estado</th>
      <th style="text-align:right">Acciones</th>
    </tr></thead>
    <tbody>
      ${rows.map(r=>{
        const d=r.data||{};
        const complete = recordIsComplete(form, d);
        return `<tr>
          <td><span class="consec">${esc(r.consecutivo)}</span></td>
          ${summaryKeys.map(k=>`<td class="${k.hideSm?'hide-sm':''}">${esc(summaryValue(d, k))}</td>`).join("")}
          ${isAdmin?`<td><span class="creator-tag" title="Creado por ${esc(creatorName(r.creadoPor))}"><span class="ct-av">${esc(initials(creatorName(r.creadoPor)))}</span>${esc(creatorName(r.creadoPor))}</span></td>`:''}
          <td><span class="badge-st ${complete?'complete':'partial'}">${complete?'Completa':'Pendiente'}</span></td>
          <td><div class="row-actions">
            <button class="icon-btn view" title="Ver documento" onclick="viewRecord('${r.id}')">${ICON.eye}</button>
            <button class="icon-btn edit" title="Editar" onclick="editRecord('${r.id}')">${ICON.edit}</button>
            <button class="icon-btn pdf" title="Descargar PDF" onclick="printRecord('${r.id}')">${ICON.pdf}</button>
            ${canDelete?`<button class="icon-btn del" title="Eliminar" onclick="deleteRecord('${r.id}')">${ICON.trash}</button>`:''}
          </div></td>
        </tr>`;
      }).join("")}
    </tbody>
  </table></div>`;
}

/* Resuelve el nombre legible de quien creó un registro (a partir del
   username guardado en creadoPor). Usa un mapa cargado de usuarios. */
function creatorName(usuario){
  if(!usuario) return "—";
  return (state.userMap && state.userMap[usuario]) || usuario;
}

function pickSummaryFields(form){
  // toma fecha + 2 primeros campos texto relevantes
  const out=[];
  const real = form.fields.filter(f=>!f.sec && f.type!=="signature" && f.type!=="checklist" && f.type!=="repeater");
  const dateF = real.find(f=>f.type==="date");
  if(dateF) out.push({k:dateF.k, label:"Fecha", type:"date"});
  for(const f of real){
    if(out.length>=3) break;
    if(f.type==="date") continue;
    if(["text","select","number"].includes(f.type)){
      out.push({k:f.k, label:f.label.length>22?f.label.slice(0,20)+"…":f.label, type:f.type, hideSm:out.length>=2});
    }
  }
  return out;
}
function summaryValue(d, k){
  let v = d[k.k];
  if(v==null||v==="") return "—";
  if(k.type==="date") return fmtDate(v);
  return String(v).length>30?String(v).slice(0,28)+"…":v;
}

/* acciones globales (llamadas desde HTML inline) */
window.editRecord = id => { const r=state.records.find(x=>x.id===id); openEditor(state.currentForm, r); };
window.printRecord = id => { const r=state.records.find(x=>x.id===id); generatePDF(state.currentForm, r, "save"); };
window.viewRecord = id => { const r=state.records.find(x=>x.id===id); generatePDF(state.currentForm, r, "view"); };
window.deleteRecord = id => { const r=state.records.find(x=>x.id===id); confirmDelete(r); };
window.openEditor = (form,r)=>openEditor(form,r);
</script>

<script>
/* ======================================================================
   EDITOR DE FORMULARIO (modal)
   - record=null => nueva boleta (se reserva consecutivo al guardar)
   - rol "seguridad": solo puede llenar campos vacíos; los ya completados
     quedan bloqueados (no puede borrar lo existente).
   ====================================================================== */
let signaturePads = {}; // k -> {canvas, ctx, dirty}

async function openEditor(form, record){
  const isNew = !record;
  const data = record ? JSON.parse(JSON.stringify(record.data||{})) : {};
  const role = state.user.rol;
  // valores por defecto en nuevos
  if(isNew){
    form.fields.forEach(f=>{
      if(f.def==="today") data[f.k]=todayISO();
      if(f.def==="now")   data[f.k]=nowHM();
    });
  }
  // "locked originals": en edición y rol seguridad, los campos que YA tenían
  // valor no se pueden modificar. Guardamos snapshot.
  const originals = record ? JSON.parse(JSON.stringify(record.data||{})) : {};
  const lockField = (f)=>{
    if(role==="admin") return false;
    if(isNew) return false;
    const ov = originals[f.k];
    return !(ov==null || ov==="" || (Array.isArray(ov)&&ov.length===0));
  };

  signaturePads = {};
  const consecLabel = isNew ? "Se asignará al guardar" : record.consecutivo;

  const body = form.fields.map(f=>renderField(f, data, lockField(f))).join("");

  const modal = el("div","modal-bg show");
  modal.id="editorModal";
  modal.innerHTML = `
    <div class="modal wide">
      <div class="modal-head">
        <div class="mh-ico" style="background:${ACCENTS[form.accent]}">${ICON[form.icon]||ICON.doc}</div>
        <div>
          <h3>${isNew?'Nueva boleta':'Editar boleta'} · ${esc(form.title)}</h3>
          <div class="mh-sub">${form.code} · ${esc(form.empresa)}</div>
        </div>
        <button class="close" id="closeEditor">${ICON.close}</button>
      </div>
      <div class="modal-body">
        <div class="consec-banner">
          <div class="cb-ico">${ICON.hash}</div>
          <div><div class="cb-t">Consecutivo</div><div class="cb-v">${esc(consecLabel)}</div></div>
        </div>
        ${role==='seguridad' && !isNew ? `<div style="background:rgba(29,111,184,.08);border:1px solid rgba(29,111,184,.2);border-radius:11px;padding:10px 14px;margin-bottom:18px;font-size:12.5px;color:var(--ice-d)">${ICON.lockmini} Como usuario de seguridad solo podés completar los campos que aún están vacíos. Los campos ya registrados aparecen bloqueados.</div>`:''}
        <div class="form-grid" id="formGrid">${body}</div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" id="cancelEditor">Cancelar</button>
        <button class="btn solid" id="saveEditor"><span id="saveLbl">${isNew?'Crear boleta':'Guardar cambios'}</span></button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.body.style.overflow="hidden";

  // init signature pads + toggles + repeaters
  initFieldBehaviors(form, data, originals, lockField);

  const close = ()=>{ modal.remove(); document.body.style.overflow=""; };
  $("#closeEditor").onclick = close;
  $("#cancelEditor").onclick = close;
  modal.addEventListener("mousedown", e=>{ if(e.target===modal) close(); });

  $("#saveEditor").onclick = ()=>saveRecord(form, record, isNew, data, lockField, close);
}

/* ---- render de un campo según tipo ---- */
function renderField(f, data, locked){
  if(f.sec) return `<div class="section-title">${ICON.arrow.replace(/width="15" height="15"/,'width="13" height="13"')} ${esc(f.sec)}</div>`;
  const cls = f.full ? "fg-full" : (f.half?"":"fg-full");
  const lockBadge = locked ? `<span class="locked">${ICON.lockmini} registrado</span>` : "";
  const req = f.req ? '<span class="req">*</span>' : '';
  const dis = locked ? "disabled" : "";
  const val = data[f.k];

  if(f.type==="signature"){
    return `<div class="ff sig-field" data-field="${f.k}">
      <label>${esc(f.label)} ${req} ${lockBadge}</label>
      ${locked && val ? `<img class="sig-locked-img" src="${val}" alt="firma">` :
      `<div class="sig-box ${val?'signed':''}" data-sig="${f.k}">
        <canvas></canvas>
        <div class="sig-placeholder">${ICON.pen}<span>Firmá aquí con el dedo o el mouse</span></div>
      </div>
      <div class="sig-actions">
        <span class="sig-status ${val?'ok':''}" id="sigst_${f.k}">${val?ICON.check+' Firmado':'Sin firmar'}</span>
        <button type="button" class="sig-clear" data-clear="${f.k}">${ICON.trash.replace(/width="17" height="17"/,'width="13" height="13"')} Limpiar</button>
      </div>`}
    </div>`;
  }
  if(f.type==="toggle"){
    const yes = val==="Sí", no = val==="No";
    return `<div class="ff fg-full" data-field="${f.k}">
      <label>${esc(f.label)} ${req} ${lockBadge}</label>
      <div class="toggle-row" data-toggle="${f.k}">
        <button type="button" class="toggle-opt ${yes?'on-yes':''}" data-val="Sí" ${dis}>Sí</button>
        <button type="button" class="toggle-opt ${no?'on-no':''}" data-val="No" ${dis}>No</button>
      </div>
    </div>`;
  }
  if(f.type==="checklist"){
    return `<div class="ff fg-full"><label>${esc(f.sec||'Aspectos a evaluar')}</label>
      <div class="check-grid" data-check="${f.k}">
        ${f.items.map(it=>{
          const cv = (val&&val[it.n])||"";
          return `<div class="check-item">
            <span class="ci-num">${it.n}</span>
            <div class="ci-label">${esc(it.label)}${it.hint?`<div style="font-size:11px;color:var(--muted-2);font-weight:400;margin-top:2px">${esc(it.hint)}</div>`:''}</div>
            <div class="toggle-row" style="width:130px;flex-shrink:0" data-chk="${it.n}">
              <button type="button" class="toggle-opt ${cv==='Sí'?'on-yes':''}" data-val="Sí" ${dis} style="padding:7px">Sí</button>
              <button type="button" class="toggle-opt ${cv==='No'?'on-no':''}" data-val="No" ${dis} style="padding:7px">No</button>
            </div>
          </div>`;
        }).join("")}
      </div></div>`;
  }
  if(f.type==="repeater"){
    return `<div class="subtable" data-rep="${f.k}">
      <div class="subtable-head"><h4>${esc(f.title||f.label)}</h4></div>
      <div class="sub-rows" id="reprows_${f.k}"></div>
      ${locked?'':`<button type="button" class="add-row" data-addrep="${f.k}">${ICON.plus} ${esc(f.addLabel||'Agregar fila')}</button>`}
    </div>`;
  }
  // input genérico
  let input="";
  if(f.type==="textarea"){
    input = `<textarea data-k="${f.k}" ${dis} placeholder="${esc(f.label)}">${esc(val||"")}</textarea>`;
  } else if(f.type==="select"){
    const hasOtro = f.options.some(o=>/^otr[oa]$/i.test(o));
    const otroVal = data[f.k+"_otro"]||"";
    const showOtro = hasOtro && /^otr[oa]$/i.test(val||"");
    input = `<select data-k="${f.k}" data-hasotro="${hasOtro?1:0}" ${dis}><option value="">— Seleccionar —</option>${f.options.map(o=>`<option ${val===o?'selected':''}>${esc(o)}</option>`).join("")}</select>`;
    if(hasOtro){
      input += `<input type="text" class="otro-input" data-kotro="${f.k}" value="${esc(otroVal)}" ${dis} placeholder="Especifique…" style="margin-top:8px;display:${showOtro?'block':'none'}">`;
    }
  } else {
    const t = f.type==="number"?"number":(f.type==="date"?"date":(f.type==="time"?"time":"text"));
    input = `<input type="${t}" data-k="${f.k}" value="${esc(val||"")}" ${dis} placeholder="${esc(f.label)}">`;
  }
  // campo condicional: solo visible si el campo referenciado tiene fecha vencida
  let condStyle = "", condAttr = "";
  if(f.showIfExpired){
    condAttr = ` data-showifexpired="${f.showIfExpired}"`;
    const refVal = data[f.showIfExpired];
    const visible = isExpired(refVal) ;
    if(!visible) condStyle = ' style="display:none"';
  }
  return `<div class="ff ${cls}"${condStyle} data-field="${f.k}"${condAttr}>
    <label>${esc(f.label)} ${req} ${lockBadge}</label>
    ${input}
    ${f.hint?`<span class="hint" style="color:var(--warn)">${esc(f.hint)}</span>`:''}
  </div>`;
}
function isExpired(iso){
  if(!iso) return false;
  const d=new Date(iso+"T00:00:00"); if(isNaN(d)) return false;
  const today=new Date(); today.setHours(0,0,0,0);
  return d < today;
}

/* ---- comportamientos: firmas, toggles, repeaters ---- */
function initFieldBehaviors(form, data, originals, lockField){
  // SIGNATURE PADS
  $$(".sig-box").forEach(box=>{
    const k = box.dataset.sig;
    const canvas = box.querySelector("canvas");
    setupSignaturePad(canvas, box, k, data);
    // si ya hay firma previa, dibujarla
    if(data[k]){ drawDataURLToCanvas(canvas, data[k]); box.classList.add("signed"); }
  });
  $$("[data-clear]").forEach(btn=>{
    btn.onclick = ()=>{
      const k=btn.dataset.clear;
      const pad = signaturePads[k];
      if(pad){ pad.ctx.clearRect(0,0,pad.canvas.width,pad.canvas.height); pad.dirty=false; }
      data[k]=null;
      const box=document.querySelector(`[data-sig="${k}"]`); box.classList.remove("signed");
      const st=$("#sigst_"+k); if(st){ st.classList.remove("ok"); st.textContent="Sin firmar"; }
    };
  });

  // TOGGLES
  $$("[data-toggle]").forEach(tr=>{
    const k=tr.dataset.toggle;
    tr.querySelectorAll(".toggle-opt").forEach(opt=>{
      opt.onclick = ()=>{
        if(opt.disabled) return;
        const v=opt.dataset.val;
        data[k] = (data[k]===v)? null : v;
        tr.querySelectorAll(".toggle-opt").forEach(o=>{ o.classList.remove("on-yes","on-no"); });
        if(data[k]==="Sí") opt.classList.add("on-yes");
        else if(data[k]==="No") opt.classList.add("on-no");
      };
    });
  });

  // CHECKLIST
  $$("[data-check]").forEach(cg=>{
    const k=cg.dataset.check;
    if(!data[k]) data[k]={};
    cg.querySelectorAll("[data-chk]").forEach(row=>{
      const n=row.dataset.chk;
      row.querySelectorAll(".toggle-opt").forEach(opt=>{
        opt.onclick=()=>{
          if(opt.disabled) return;
          const v=opt.dataset.val;
          data[k][n] = (data[k][n]===v)?"":v;
          row.querySelectorAll(".toggle-opt").forEach(o=>o.classList.remove("on-yes","on-no"));
          if(data[k][n]==="Sí") opt.classList.add("on-yes");
          else if(data[k][n]==="No") opt.classList.add("on-no");
        };
      });
    });
  });

  // REPEATERS
  form.fields.filter(f=>f.type==="repeater").forEach(f=>{
    const k=f.k;
    if(!Array.isArray(data[k])) data[k]=[];
    const cont = $("#reprows_"+k);
    const locked = lockField(f);
    const renderRows = ()=>{
      cont.innerHTML="";
      data[k].forEach((row,idx)=>{
        const rEl=el("div","sub-row");
        rEl.style.gridTemplateColumns = `repeat(${f.cols.length}, 1fr) auto`;
        rEl.innerHTML = f.cols.map(c=>{
          const cv=row[c.k]||"";
          if(c.type==="select"){
            return `<div class="ff"><label>${esc(c.label)}</label><select data-rk="${c.k}" data-idx="${idx}" ${locked?'disabled':''}><option value="">—</option>${c.options.map(o=>`<option ${cv===o?'selected':''}>${esc(o)}</option>`).join("")}</select></div>`;
          }
          return `<div class="ff"><label>${esc(c.label)}</label><input data-rk="${c.k}" data-idx="${idx}" value="${esc(cv)}" ${locked?'disabled':''}></div>`;
        }).join("") + (locked?'':`<button type="button" class="rm-row" data-rm="${idx}">${ICON.trash.replace(/width="17" height="17"/,'width="15" height="15"')}</button>`);
        cont.appendChild(rEl);
      });
      cont.querySelectorAll("[data-rk]").forEach(inp=>{
        inp.oninput = ()=>{ data[k][+inp.dataset.idx][inp.dataset.rk]=inp.value; };
        inp.onchange = ()=>{ data[k][+inp.dataset.idx][inp.dataset.rk]=inp.value; };
      });
      cont.querySelectorAll("[data-rm]").forEach(b=>{
        b.onclick=()=>{ data[k].splice(+b.dataset.rm,1); renderRows(); };
      });
    };
    renderRows();
    const addBtn=document.querySelector(`[data-addrep="${k}"]`);
    if(addBtn) addBtn.onclick=()=>{ data[k].push({}); renderRows(); };
  });

  // INPUTS genéricos -> data
  $$("#formGrid [data-k]").forEach(inp=>{
    const k=inp.dataset.k;
    const sync=()=>{
      data[k]=inp.value;
      // manejo de opción "Otro" en selects
      if(inp.dataset.hasotro==="1"){
        const otro = document.querySelector(`[data-kotro="${k}"]`);
        if(otro){
          const show = /^otr[oa]$/i.test(inp.value);
          otro.style.display = show?"block":"none";
          if(!show){ otro.value=""; data[k+"_otro"]=""; }
          else { setTimeout(()=>otro.focus(),50); }
        }
      }
      // campos condicionales por fecha vencida que dependen de este campo
      document.querySelectorAll(`[data-showifexpired="${k}"]`).forEach(cond=>{
        const show = isExpired(inp.value);
        cond.style.display = show?"":"none";
        if(!show){ const ci=cond.querySelector("[data-k]"); if(ci){ ci.value=""; data[ci.dataset.k]=""; } }
      });
    };
    inp.oninput=sync; inp.onchange=sync;
  });
  // inputs "Otro" -> data
  $$('#formGrid [data-kotro]').forEach(inp=>{
    const k=inp.dataset.kotro;
    const sync=()=>{ data[k+"_otro"]=inp.value; };
    inp.oninput=sync; inp.onchange=sync;
  });
}
</script>

<script>
/* ======================================================================
   SIGNATURE PAD
   ====================================================================== */
function setupSignaturePad(canvas, box, key, data){
  const ratio = window.devicePixelRatio||1;
  const resize = ()=>{
    const rect = canvas.getBoundingClientRect();
    const w = rect.width||box.clientWidth||400;
    const h = 150;
    // preservar contenido al re-escalar
    const prev = canvas.toDataURL();
    canvas.width = w*ratio; canvas.height = h*ratio;
    const ctx = canvas.getContext("2d");
    ctx.scale(ratio,ratio);
    ctx.lineWidth=2.2; ctx.lineCap="round"; ctx.lineJoin="round"; ctx.strokeStyle="#10231b";
    signaturePads[key] = {canvas, ctx, dirty:!!data[key], w, h};
    if(data[key]) drawDataURLToCanvas(canvas, data[key]);
  };
  setTimeout(resize, 30);

  let drawing=false, last=null;
  const pos = e=>{
    const r=canvas.getBoundingClientRect();
    const t = e.touches?e.touches[0]:e;
    return {x:t.clientX-r.left, y:t.clientY-r.top};
  };
  const start = e=>{
    e.preventDefault();
    const pad=signaturePads[key]; if(!pad) return;
    drawing=true; last=pos(e);
    pad.ctx.beginPath(); pad.ctx.moveTo(last.x,last.y);
  };
  const move = e=>{
    if(!drawing) return;
    e.preventDefault();
    const pad=signaturePads[key]; const p=pos(e);
    pad.ctx.lineTo(p.x,p.y); pad.ctx.stroke();
    last=p;
    if(!pad.dirty){ pad.dirty=true; markSigned(key,box,data,canvas); }
  };
  const end = ()=>{ if(drawing){ drawing=false; saveSig(key,data,canvas); } };

  canvas.addEventListener("mousedown",start);
  canvas.addEventListener("mousemove",move);
  window.addEventListener("mouseup",end);
  canvas.addEventListener("touchstart",start,{passive:false});
  canvas.addEventListener("touchmove",move,{passive:false});
  canvas.addEventListener("touchend",end);
}
function markSigned(key,box,data,canvas){
  box.classList.add("signed");
  const st=$("#sigst_"+key); if(st){ st.classList.add("ok"); st.innerHTML=ICON.check+' Firmado'; }
}
function saveSig(key,data,canvas){
  data[key]=canvas.toDataURL("image/png");
}
function drawDataURLToCanvas(canvas, url){
  const img=new Image();
  img.onload=()=>{
    const ctx=canvas.getContext("2d");
    const ratio=window.devicePixelRatio||1;
    ctx.drawImage(img,0,0,canvas.width/ratio,canvas.height/ratio);
  };
  img.src=url;
}

/* ======================================================================
   GUARDAR REGISTRO
   ====================================================================== */
async function saveRecord(form, record, isNew, data, lockField, close){
  // validar requeridos
  const miss = missingFields(form, data);
  // firmas requeridas
  const missSig = form.fields.filter(f=>f.type==="signature" && f.req && !data[f.k]);
  if(miss.length || missSig.length){
    const names = [...miss, ...missSig].map(f=>f.label).slice(0,4).join(", ");
    toast("Faltan campos obligatorios: "+names+(miss.length+missSig.length>4?"…":""), "warn", 4200);
    // resaltar primer faltante
    const first=[...miss,...missSig][0];
    const node=document.querySelector(`[data-field="${first.k}"]`);
    if(node){ node.scrollIntoView({behavior:"smooth",block:"center"}); node.style.animation="shake .4s"; setTimeout(()=>node.style.animation="",500); }
    return;
  }

  const btn=$("#saveEditor"), lbl=$("#saveLbl");
  btn.disabled=true; lbl.innerHTML='<span class="spinner sm" style="border-top-color:#fff;border-color:rgba(255,255,255,.4)"></span> Guardando…';

  try{
    const complete = recordIsComplete(form, data);
    if(isNew){
      const consec = await nextConsecutivo(form.code);
      const rec = {
        formId: form.id, formCode: form.code, consecutivo: consec,
        data, complete,
        creadoPor: state.user.usuario, creadoEn: new Date().toISOString(),
        editadoPor: state.user.usuario, editadoEn: new Date().toISOString()
      };
      const saved = await dbCreateRecord(rec);
      if(state.demo) state.records.unshift(saved); // en tiempo real lo trae el snapshot
      toast("Boleta creada · "+consec, "ok");
    } else {
      const patch = { data, complete, editadoPor:state.user.usuario, editadoEn:new Date().toISOString() };
      await dbUpdateRecord(record.id, patch);
      Object.assign(record, patch);
      toast("Cambios guardados", "ok");
    }
    close();
    if(state.demo) paintRecords(); // en tiempo real repinta el listener
  }catch(e){
    console.error(e);
    btn.disabled=false; lbl.textContent=isNew?'Crear boleta':'Guardar cambios';
    toast("Error al guardar: "+(e.message||e), "err", 4500);
  }
}

/* ======================================================================
   CONFIRMACIÓN DE BORRADO (solo admin)
   ====================================================================== */
function confirmDelete(record){
  if(state.user.rol!=="admin"){ toast("Solo el administrador puede eliminar registros","warn"); return; }
  const modal=el("div","modal-bg show");
  modal.innerHTML=`
    <div class="modal narrow">
      <div class="modal-body">
        <div class="confirm-body">
          <div class="confirm-ico">${ICON.trash}</div>
          <h3>¿Eliminar esta boleta?</h3>
          <p>Vas a eliminar de forma permanente el registro <b>${esc(record.consecutivo)}</b>. Esta acción no se puede deshacer.</p>
        </div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" id="cdCancel">Cancelar</button>
        <button class="btn danger" id="cdOk">${ICON.trash.replace(/width="17" height="17"/,'width="16" height="16"')} Eliminar</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const close=()=>modal.remove();
  $("#cdCancel").onclick=close;
  modal.addEventListener("mousedown",e=>{ if(e.target===modal) close(); });
  $("#cdOk").onclick=async()=>{
    const b=$("#cdOk"); b.disabled=true; b.innerHTML='<span class="spinner sm" style="border-top-color:#fff;border-color:rgba(255,255,255,.4)"></span> Eliminando…';
    try{
      await dbDeleteRecord(record.id);
      if(state.demo){ state.records=state.records.filter(x=>x.id!==record.id); paintRecords(); }
      close();
      toast("Registro eliminado","ok");
    }catch(e){ console.error(e); b.disabled=false; b.textContent="Eliminar"; toast("Error al eliminar","err"); }
  };
}
</script>

<script>
/* ======================================================================
   GENERACIÓN DE PDF (boleta imprimible)
   Usa jsPDF + autoTable. Incluye logo, encabezado tipo SIG, consecutivo,
   campos por sección, sub-tablas, checklists y firmas embebidas.
   ====================================================================== */
async function generatePDF(form, record, mode="save"){
  toast(mode==="view"?"Abriendo documento…":"Generando PDF…","info",1500);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"mm", format:"a4"});
  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();
  const M = 14;
  const data = record.data||{};
  const accentRGB = accentToRGB(form.accent);

  /* ---------- ENCABEZADO ---------- */
  // ambos logos (B&C + Bajo Cero) apilados en la celda izquierda
  try{
    const dB = await imgSize(LOGOS.byc);
    const dC = await imgSize(LOGOS.bc);
    const lh = 8;
    const wB = Math.min(lh*(dB.w/dB.h), 40);
    const wC = Math.min(lh*(dC.w/dC.h), 40);
    doc.addImage(LOGOS.byc, "PNG", M+1, 11, wB, lh);
    doc.addImage(LOGOS.bc,  "PNG", M+1, 20.5, wC, lh);
  }catch(e){}

  // marco cabecera
  doc.setDrawColor(200); doc.setLineWidth(0.3);
  const headY=10, headH=23;
  doc.rect(M, headY, PW-2*M, headH);
  // divisiones
  const c1=M+46, c2=PW-M-44;
  doc.line(c1, headY, c1, headY+headH);
  doc.line(c2, headY, c2, headY+headH);
  // título central (tamaño dinámico según largo, subtítulos siempre debajo)
  const midX=(c1+c2)/2, innerW=c2-c1-4;
  let tSize = form.title.length>42?9:(form.title.length>30?10.5:12);
  doc.setFont("helvetica","bold"); doc.setFontSize(tSize); doc.setTextColor(20);
  let tLines = doc.splitTextToSize(form.title, innerW);
  // limitar a 2 líneas; si excede, reducir más
  if(tLines.length>2){ tSize=8; doc.setFontSize(tSize); tLines=doc.splitTextToSize(form.title, innerW); }
  const lineH = tSize*0.42;
  const titleBlockH = tLines.length*lineH;
  // bloque título+empresa+sistema centrado verticalmente en la celda
  let ty = headY + (headH - (titleBlockH + 7))/2 + lineH;
  doc.text(tLines, midX, ty, {align:"center"});
  let sy = ty + (tLines.length-1)*lineH + 3.4;
  doc.setFont("helvetica","normal"); doc.setFontSize(7); doc.setTextColor(90);
  doc.text(form.empresa, midX, sy, {align:"center", maxWidth:innerW});
  doc.setFontSize(6.5);
  doc.text(form.sistema, midX, sy+3.3, {align:"center", maxWidth:innerW});
  // bloque código
  doc.setFontSize(7); doc.setTextColor(40);
  const cx=c2+3;
  doc.text(`Código: ${form.code}`, cx, headY+5);
  doc.text(`Versión: 001`, cx, headY+10);
  doc.text(`Página 1/1`, cx, headY+15);

  /* ---------- BANNER CONSECUTIVO ---------- */
  let y = headY+headH+6;
  doc.setFillColor(accentRGB[0],accentRGB[1],accentRGB[2]);
  doc.roundedRect(M, y, PW-2*M, 11, 2,2,"F");
  doc.setTextColor(255); doc.setFont("helvetica","bold"); doc.setFontSize(8);
  doc.text("CONSECUTIVO", M+4, y+4.5);
  doc.setFontSize(13);
  doc.text(record.consecutivo, M+4, y+9);
  doc.setFont("helvetica","normal"); doc.setFontSize(7.5);
  const estado = recordIsComplete(form,data)?"COMPLETA":"PENDIENTE";
  doc.text(`Estado: ${estado}`, PW-M-4, y+5.5, {align:"right"});
  doc.text(`Generado: ${new Date().toLocaleString("es-CR")}`, PW-M-4, y+9, {align:"right"});
  y+=16;

  /* ---------- CAMPOS POR SECCIÓN ---------- */
  const signatures=[]; // {label, img}
  doc.setTextColor(30);

  for(const f of form.fields){
    if(f.sec){
      ensureSpace(doc, y, 12, ()=>y=20);
      if(y>20) y+=2;
      doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(accentRGB[0],accentRGB[1],accentRGB[2]);
      doc.text(f.sec.toUpperCase(), M, y);
      doc.setDrawColor(accentRGB[0],accentRGB[1],accentRGB[2]); doc.setLineWidth(0.4);
      doc.line(M, y+1.5, PW-M, y+1.5);
      y+=6; doc.setTextColor(30);
      continue;
    }
    if(f.type==="signature"){
      if(data[f.k]){
        let nm = "";
        if(f.nameField){
          const nf = form.fields.find(x=>x.k===f.nameField);
          let raw = data[f.nameField];
          if(nf && /^otr[oa]$/i.test(raw||"") && data[f.nameField+"_otro"]) raw = data[f.nameField+"_otro"];
          nm = raw||"";
        }
        signatures.push({label:f.label, img:data[f.k], name:nm});
      }
      continue;
    }
    if(f.type==="checklist"){
      const rows = f.items.map(it=>[String(it.n), it.label, (data[f.k]&&data[f.k][it.n])||"—"]);
      doc.autoTable({
        startY:y, margin:{left:M,right:M},
        head:[["N°","Aspecto a evaluar","¿Presenta?"]],
        body:rows,
        theme:"grid", styles:{fontSize:8, cellPadding:1.6, textColor:[40,40,40]},
        headStyles:{fillColor:accentRGB, textColor:255, fontSize:8},
        columnStyles:{0:{cellWidth:10,halign:"center"},2:{cellWidth:24,halign:"center"}}
      });
      y = doc.lastAutoTable.finalY+5;
      continue;
    }
    if(f.type==="repeater"){
      const arr = data[f.k]||[];
      if(arr.length){
        const head=[f.cols.map(c=>c.label)];
        const rows=arr.map(r=>f.cols.map(c=>r[c.k]||"—"));
        doc.autoTable({
          startY:y, margin:{left:M,right:M},
          head, body:rows, theme:"grid",
          styles:{fontSize:7.5, cellPadding:1.4, textColor:[40,40,40]},
          headStyles:{fillColor:accentRGB, textColor:255, fontSize:7.5}
        });
        y = doc.lastAutoTable.finalY+5;
      }
      continue;
    }
    // campo normal -> label: value
    let v = data[f.k];
    if(f.type==="date") v=fmtDate(v);
    else if(f.type==="time") v=fmt12h(v);
    else if(/^otr[oa]$/i.test(v||"") && data[f.k+"_otro"]) v="Otro: "+data[f.k+"_otro"];
    if(v==null||v==="") v="—";
    ensureSpace(doc, y, 9, ()=>y=20);
    doc.setFont("helvetica","bold"); doc.setFontSize(8); doc.setTextColor(70);
    doc.text(f.label+":", M, y);
    const lblW = doc.getTextWidth(f.label+":");
    doc.setFont("helvetica","normal"); doc.setTextColor(20); doc.setFontSize(8.5);
    const lines = doc.splitTextToSize(String(v), PW-2*M-lblW-3);
    doc.text(lines, M+lblW+2, y);
    y += Math.max(5.5, lines.length*4.4);
  }

  /* ---------- FIRMAS ---------- */
  if(signatures.length){
    ensureSpace(doc, y, 36, ()=>y=20);
    y+=3;
    doc.setFont("helvetica","bold"); doc.setFontSize(9); doc.setTextColor(accentRGB[0],accentRGB[1],accentRGB[2]);
    doc.text("FIRMAS", M, y);
    doc.line(M, y+1.5, PW-M, y+1.5); y+=6;
    const perRow=2, cellW=(PW-2*M-6)/perRow, sigH=30;
    let i=0;
    while(i<signatures.length){
      ensureSpace(doc, y, sigH+8, ()=>y=20);
      for(let c=0;c<perRow && i<signatures.length;c++,i++){
        const sx = M + c*(cellW+6);
        const s = signatures[i];
        doc.setDrawColor(200); doc.setLineWidth(0.3);
        doc.rect(sx, y, cellW, sigH);
        // firma (imagen)
        try{ doc.addImage(s.img,"PNG", sx+2, y+1.5, cellW-4, 15); }catch(e){}
        // línea de firma
        doc.setDrawColor(150); doc.setLineWidth(0.3);
        doc.line(sx+6, y+18, sx+cellW-6, y+18);
        // nombre debajo de la firma
        if(s.name){
          doc.setFont("helvetica","bold"); doc.setFontSize(7.5); doc.setTextColor(30);
          doc.text(doc.splitTextToSize(s.name, cellW-4), sx+cellW/2, y+22, {align:"center"});
        }
        // etiqueta (rol)
        doc.setFont("helvetica","normal"); doc.setFontSize(6.5); doc.setTextColor(110);
        doc.text(s.label, sx+cellW/2, y+sigH-2.5, {align:"center", maxWidth:cellW-3});
      }
      y+=sigH+5;
    }
  }

  /* ---------- FIRMAS ESTÁTICAS DEL PIE (elaborado/revisado/aprobado) ---------- */
  if(form.footerSign){
    ensureSpace(doc, y, 20, ()=>y=20);
    y+=2;
    const n=form.footerSign.length, cw=(PW-2*M)/n;
    form.footerSign.forEach((fs,idx)=>{
      const sx=M+idx*cw;
      doc.setDrawColor(120); doc.setLineWidth(0.3);
      doc.line(sx+4, y+10, sx+cw-4, y+10);
      doc.setFont("helvetica","bold"); doc.setFontSize(7); doc.setTextColor(60);
      doc.text(fs.label, sx+cw/2, y+14, {align:"center"});
      if(fs.static){ doc.setFont("helvetica","normal"); doc.setFontSize(6.5); doc.setTextColor(90);
        doc.text(doc.splitTextToSize(fs.static, cw-6), sx+cw/2, y+17.5, {align:"center"}); }
    });
    y+=22;
  }

  /* ---------- PIE ---------- */
  doc.setFontSize(6.5); doc.setTextColor(150);
  doc.text(`SecuDocs · ${form.empresa} · Registrado por: ${record.creadoPor||"—"} · ${record.consecutivo}`, M, PH-8);

  if(mode==="view"){
    openPdfViewer(doc, record.consecutivo);
  } else {
    doc.save(`${record.consecutivo}.pdf`);
    toast("PDF generado: "+record.consecutivo,"ok");
  }
}

/* Visor de PDF inline (modal con iframe + botón descargar) */
function openPdfViewer(doc, consec){
  const url = doc.output("bloburl");
  const modal = el("div","modal-bg show");
  modal.innerHTML = `
    <div class="modal" style="max-width:860px;width:100%">
      <div class="modal-head">
        <div class="mh-ico" style="background:var(--grad-emerald)">${ICON.pdf}</div>
        <div><h3>Documento ${esc(consec)}</h3><div class="mh-sub">Vista previa de la boleta</div></div>
        <button class="close" id="pvClose">${ICON.close}</button>
      </div>
      <div style="padding:0;background:#525659">
        <iframe src="${url}" style="width:100%;height:65vh;border:none;display:block"></iframe>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" id="pvCloseB">Cerrar</button>
        <button class="btn solid" id="pvDl">${ICON.pdf} Descargar PDF</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  document.body.style.overflow="hidden";
  const close=()=>{ modal.remove(); document.body.style.overflow=""; URL.revokeObjectURL(url); };
  $("#pvClose").onclick=close; $("#pvCloseB").onclick=close;
  modal.addEventListener("mousedown",e=>{ if(e.target===modal) close(); });
  $("#pvDl").onclick=()=>doc.save(`${consec}.pdf`);
}

function ensureSpace(doc, y, need, reset){
  const PH=doc.internal.pageSize.getHeight();
  if(y+need > PH-14){ doc.addPage(); reset(); }
}
function imgSize(url){ return new Promise((res,rej)=>{ const i=new Image(); i.onload=()=>res({w:i.width,h:i.height}); i.onerror=rej; i.src=url; }); }
function accentToRGB(a){
  const map={emerald:[13,122,79],gold:[199,154,60],ice:[29,111,184],violet:[109,77,158],red:[192,57,43],teal:[14,138,130],slate:[66,86,107],amber:[199,127,26],cyan:[14,116,144]};
  return map[a]||[13,122,79];
}
</script>

<script>
/* ======================================================================
   GESTIÓN DE USUARIOS (solo admin)
   ====================================================================== */
async function renderUsers(){
  if(state.user.rol!=="admin"){ state.view="dashboard"; renderDashboard(); return; }
  stopRealtime(); // cerrar listeners de otras vistas
  const main=$("#main");
  main.innerHTML=`
    <div class="page-head">
      <h2>Gestión de usuarios ${state.demo?'':'<span class="live-badge" id="liveBadge" title="Actualización en tiempo real"><span class="live-dot"></span> En vivo</span>'}</h2>
      <p>Creá, editá y eliminá las cuentas de acceso. Los usuarios con rol <b>Seguridad</b> solo pueden crear y completar boletas; los <b>Administradores</b> tienen acceso total.</p>
    </div>
    <div class="toolbar">
      <div class="search-box"><span class="ico">${ICON.search}</span><input id="userSearch" placeholder="Buscar usuario…"></div>
      <button class="btn solid" id="newUser">${ICON.plus} Nuevo usuario</button>
    </div>
    <div id="userList"><div class="loader-wrap"><div class="spinner"></div><p>Cargando usuarios…</p></div></div>`;
  $("#newUser").onclick=()=>userEditor(null);

  let users=[];
  let query="";

  const paint=()=>{
    if(state.view!=="users") return;
    const list=$("#userList");
    if(!list) return;
    const f=users.filter(u=>!query || (u.nombre+" "+u.usuario).toLowerCase().includes(query));
    if(f.length===0){ list.innerHTML=`<div class="empty-state"><div class="es-ico">${ICON.users}</div><h3>Sin usuarios</h3></div>`; return; }
    list.innerHTML=`<div class="fade-list">`+f.map(u=>`
      <div class="user-card">
        <div class="uc-av" style="background:${u.rol==='admin'?ACCENTS.gold:ACCENTS.ice}">${initials(u.nombre)}</div>
        <div class="uc-info">
          <b>${esc(u.nombre)}</b>
          <small>@${esc(u.usuario)} · <span class="role-tag ${u.rol}">${u.rol==='admin'?'Administrador':'Seguridad'}</span></small>
        </div>
        <div class="uc-actions">
          <button class="icon-btn edit" title="Editar" onclick="window._userEdit('${u.id}')">${ICON.edit}</button>
          ${u.usuario!==state.user.usuario?`<button class="icon-btn del" title="Eliminar" onclick="window._userDel('${u.id}')">${ICON.trash}</button>`:''}
        </div>
      </div>`).join("")+`</div>`;
  };

  $("#userSearch").addEventListener("input",e=>{ query=e.target.value.toLowerCase(); paint(); });

  // edición/eliminación usan el array vivo "users"
  window._userEdit=id=>userEditor(users.find(u=>u.id===id));
  window._userDel=id=>{
    const u=users.find(x=>x.id===id);
    const modal=el("div","modal-bg show");
    modal.innerHTML=`<div class="modal narrow"><div class="modal-body"><div class="confirm-body">
      <div class="confirm-ico">${ICON.trash}</div><h3>¿Eliminar usuario?</h3>
      <p>Se eliminará la cuenta de <b>${esc(u.nombre)}</b> (@${esc(u.usuario)}).</p></div></div>
      <div class="modal-foot"><button class="btn ghost" id="udC">Cancelar</button><button class="btn danger" id="udO">Eliminar</button></div></div>`;
    document.body.appendChild(modal);
    const close=()=>modal.remove();
    $("#udC").onclick=close; modal.addEventListener("mousedown",e=>{if(e.target===modal)close();});
    $("#udO").onclick=async()=>{
      const b=$("#udO"); b.disabled=true; b.innerHTML='<span class="spinner sm" style="border-top-color:#fff;border-color:rgba(255,255,255,.4)"></span> Eliminando…';
      try{
        await dbDeleteUser(id); close(); toast("Usuario eliminado","ok");
        if(state.demo){ users=users.filter(x=>x.id!==id); paint(); }
      }catch(e){ b.disabled=false; b.textContent="Eliminar"; toast("Error al eliminar","err"); }
    };
  };

  if(state.demo){
    try{ users=await dbListUsers(); }catch(e){ console.error(e); }
    paint();
  } else {
    let first=true;
    state.unsub.users = subscribeUsers(arr=>{
      users = arr;
      paint();
      if(!first) flashLiveDot();
      first=false;
    });
    if(!state.unsub.users){ try{ users=await dbListUsers(); }catch(e){} paint(); }
  }
}

function userEditor(user, onDone){
  const isNew=!user;
  const modal=el("div","modal-bg show");
  modal.innerHTML=`
    <div class="modal narrow">
      <div class="modal-head">
        <div class="mh-ico" style="background:${ACCENTS.emerald}">${ICON.user}</div>
        <div><h3>${isNew?'Nuevo usuario':'Editar usuario'}</h3><div class="mh-sub">Cuenta de acceso a SecuDocs</div></div>
        <button class="close" id="ueClose">${ICON.close}</button>
      </div>
      <div class="modal-body">
        <div class="ff" style="margin-bottom:14px"><label>Nombre completo <span class="req">*</span></label>
          <input id="ueName" value="${esc(user?.nombre||'')}" placeholder="Ej: Juan Pérez"></div>
        <div class="ff" style="margin-bottom:14px"><label>Usuario <span class="req">*</span></label>
          <input id="ueUser" value="${esc(user?.usuario||'')}" placeholder="usuario" autocapitalize="none" ${user?'':''}></div>
        <div class="ff" style="margin-bottom:14px"><label>Rol <span class="req">*</span></label>
          <select id="ueRole">
            <option value="seguridad" ${user?.rol==='seguridad'?'selected':''}>Seguridad (crear y completar)</option>
            <option value="admin" ${user?.rol==='admin'?'selected':''}>Administrador (acceso total)</option>
          </select></div>
        <div class="ff"><label>Contraseña ${isNew?'<span class="req">*</span>':'<span style="font-weight:400;color:var(--muted)">(dejar vacío para no cambiar)</span>'}</label>
          <input id="uePwd" type="password" placeholder="${isNew?'Mínimo 5 caracteres':'••••••••'}"></div>
      </div>
      <div class="modal-foot">
        <button class="btn ghost" id="ueCancel">Cancelar</button>
        <button class="btn solid" id="ueSave"><span id="ueLbl">${isNew?'Crear usuario':'Guardar'}</span></button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const close=()=>modal.remove();
  $("#ueClose").onclick=close; $("#ueCancel").onclick=close;
  modal.addEventListener("mousedown",e=>{if(e.target===modal)close();});
  $("#ueSave").onclick=async()=>{
    const nombre=$("#ueName").value.trim();
    const usuario=$("#ueUser").value.trim().toLowerCase();
    const rol=$("#ueRole").value;
    const pwd=$("#uePwd").value;
    if(!nombre||!usuario){ toast("Completá nombre y usuario","warn"); return; }
    if(isNew && pwd.length<5){ toast("La contraseña debe tener al menos 5 caracteres","warn"); return; }
    if(!isNew && pwd && pwd.length<5){ toast("La contraseña debe tener al menos 5 caracteres","warn"); return; }
    const btn=$("#ueSave"),lbl=$("#ueLbl"); btn.disabled=true;
    lbl.innerHTML='<span class="spinner sm" style="border-top-color:#fff;border-color:rgba(255,255,255,.4)"></span> Guardando…';
    try{
      // unicidad de usuario
      if(isNew || (user && user.usuario!==usuario)){
        const exists=await dbGetUserByName(usuario);
        if(exists){ btn.disabled=false; lbl.textContent=isNew?'Crear usuario':'Guardar'; toast("Ese nombre de usuario ya existe","warn"); return; }
      }
      if(isNew){
        await dbCreateUser({nombre,usuario,rol,pwd:await hashPwd(pwd),creado:todayISO()});
        toast("Usuario creado","ok");
      }else{
        const patch={nombre,usuario,rol};
        if(pwd) patch.pwd=await hashPwd(pwd);
        await dbUpdateUser(user.id,patch);
        toast("Usuario actualizado","ok");
      }
      close();
      if(state.demo) renderUsers(); else if(typeof onDone==="function") onDone();
    }catch(e){ console.error(e); btn.disabled=false; lbl.textContent=isNew?'Crear usuario':'Guardar'; toast("Error al guardar usuario","err"); }
  };
  $("#ueName").focus();
}

/* ======================================================================
   ARRANQUE
   ====================================================================== */
async function boot(){
  if(state.demo) demoLoad();
  let seeded=false;
  try{ seeded = await ensureSeedAdmin(); }catch(e){ console.warn("seed:",e); }

  const boot=$("#bootLoader");
  setTimeout(()=>{ boot.classList.add("hide"); setTimeout(()=>boot.remove(),550); }, 700);

  const sess = loadSession();
  if(sess){
    // revalidar que el usuario aún exista
    try{
      const u = await dbGetUserByName(sess.usuario);
      if(u){ state.user={id:u.id,usuario:u.usuario,nombre:u.nombre,rol:u.rol}; renderApp(); return; }
    }catch(e){}
  }
  renderLogin();
  if(seeded && state.demo){
    setTimeout(()=>toast("Modo demo: usuario admin / admin123","info",6000), 1200);
  }
}

document.addEventListener("DOMContentLoaded", boot);
</script>

</body>
</html>
