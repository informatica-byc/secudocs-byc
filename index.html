<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>SecuDocs · Digitalización de Documentos de Seguridad — B&C / Bajo Cero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --emerald:#0d7a4f; --emerald-d:#085c3a; --emerald-l:#16a06a;
  --gold:#c79a3c; --gold-d:#a87f28;
  --ice:#1d6fb8; --ice-d:#155a96;
  --ink:#10231b; --ink-soft:#2c4338;
  --bg:#eef4f0; --bg-2:#e2ebe5;
  --surface:#ffffff; --surface-2:#f6faf7;
  --line:#d6e2db; --line-2:#c2d3c9;
  --muted:#6b8579; --muted-2:#8aa093;
  --danger:#c0392b; --danger-d:#962d22;
  --warn:#d98a1f;
  --ok:#1f9d63;
  --radius:18px; --radius-s:12px; --radius-xs:9px;
  --shadow:0 10px 40px -12px rgba(13,74,49,.28), 0 2px 8px -2px rgba(13,74,49,.12);
  --shadow-sm:0 4px 18px -6px rgba(13,74,49,.22);
  --grad-emerald:linear-gradient(135deg,#0d7a4f 0%,#16a06a 55%,#0d7a4f 100%);
  --grad-gold:linear-gradient(135deg,#c79a3c,#e6c66e);
  --grad-ice:linear-gradient(135deg,#1d6fb8,#3a9bd8);
  --font:'Inter',system-ui,sans-serif; --display:'Sora',system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--font); color:var(--ink); background:var(--bg);
  background-image:
    radial-gradient(1200px 600px at 110% -10%, rgba(22,160,106,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(29,111,184,.08), transparent 60%);
  -webkit-font-smoothing:antialiased; overflow-x:hidden;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
a{color:var(--emerald);text-decoration:none}
::-webkit-scrollbar{width:11px;height:11px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:20px;border:3px solid var(--bg)}
::-webkit-scrollbar-thumb:hover{background:var(--muted-2)}

/* ============ ANIMACIONES ============ */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
@keyframes floatUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(28px)}to{opacity:1;transform:translateX(0)}}
@keyframes shimmer{to{background-position:200% 0}}
@keyframes drift{0%{transform:translate(0,0)}50%{transform:translate(14px,-10px)}100%{transform:translate(0,0)}}
@keyframes ring{0%{transform:scale(.7);opacity:.8}100%{transform:scale(2.4);opacity:0}}
@keyframes shake{10%,90%{transform:translateX(-1px)}20%,80%{transform:translateX(2px)}30%,50%,70%{transform:translateX(-4px)}40%,60%{transform:translateX(4px)}}
@keyframes barGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ============ VIEW TRANSITIONS (entre vistas) ============ */
.view{display:none;animation:floatUp .5s cubic-bezier(.2,.8,.2,1) both}
.view.active{display:block}
.view-fade{animation:fadeIn .4s ease both}

/* ============ SPINNER ============ */
.spinner{width:46px;height:46px;border-radius:50%;
  border:4px solid rgba(13,122,79,.16);border-top-color:var(--emerald);
  animation:spin .8s linear infinite}
.spinner.sm{width:20px;height:20px;border-width:3px}
.spinner.gold{border-color:rgba(199,154,60,.2);border-top-color:var(--gold)}
.loader-wrap{display:flex;flex-direction:column;align-items:center;gap:16px;padding:48px}
.loader-wrap p{color:var(--muted);font-size:14px;letter-spacing:.3px;animation:pulse 1.6s ease infinite}

/* ============ LOGIN ============ */
#loginView{min-height:100vh;display:grid;place-items:center;padding:24px;position:relative;overflow:hidden}
.login-bg{position:absolute;inset:0;z-index:0}
.login-bg .blob{position:absolute;border-radius:50%;filter:blur(46px);opacity:.5}
.login-bg .b1{width:420px;height:420px;background:radial-gradient(circle,#16a06a,transparent 70%);top:-120px;right:-80px;animation:drift 14s ease-in-out infinite}
.login-bg .b2{width:360px;height:360px;background:radial-gradient(circle,#1d6fb8,transparent 70%);bottom:-100px;left:-60px;animation:drift 18s ease-in-out infinite reverse}
.login-bg .b3{width:260px;height:260px;background:radial-gradient(circle,#c79a3c,transparent 70%);top:40%;left:50%;animation:drift 22s ease-in-out infinite}
.login-card{position:relative;z-index:2;width:100%;max-width:410px;background:rgba(255,255,255,.82);
  backdrop-filter:blur(22px) saturate(140%);-webkit-backdrop-filter:blur(22px) saturate(140%);
  border:1px solid rgba(255,255,255,.7);border-radius:26px;padding:40px 34px 34px;
  box-shadow:0 30px 80px -20px rgba(8,60,38,.4);animation:scaleIn .6s cubic-bezier(.2,.9,.2,1) both}
.login-logos{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:22px}
.login-logos img{height:42px;object-fit:contain}
.login-logos .sep{width:1px;height:34px;background:var(--line-2)}
.login-brand{text-align:center;margin-bottom:26px}
.login-brand h1{font-family:var(--display);font-size:27px;font-weight:800;letter-spacing:-.5px;
  background:linear-gradient(120deg,var(--emerald),var(--ice));-webkit-background-clip:text;background-clip:text;color:transparent}
.login-brand p{color:var(--muted);font-size:13px;margin-top:4px;font-weight:500}
.field{position:relative;margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:7px;letter-spacing:.2px}
.field .ico{position:absolute;left:14px;top:38px;color:var(--muted-2);pointer-events:none}
.inp{width:100%;padding:13px 14px 13px 42px;border:1.5px solid var(--line);border-radius:13px;
  background:var(--surface);transition:.25s;outline:none}
.inp:focus{border-color:var(--emerald-l);box-shadow:0 0 0 4px rgba(22,160,106,.12)}
.inp.plain{padding-left:14px}
.btn-primary{width:100%;padding:14px;border-radius:13px;background:var(--grad-emerald);color:#fff;
  font-weight:700;font-size:15px;letter-spacing:.3px;position:relative;overflow:hidden;
  box-shadow:0 12px 26px -10px rgba(13,122,79,.7);transition:transform .15s,box-shadow .2s;margin-top:6px}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 16px 32px -10px rgba(13,122,79,.8)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.7;cursor:wait;transform:none}
.btn-primary .lbl{display:inline-flex;align-items:center;gap:9px;justify-content:center}
.login-err{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);color:var(--danger-d);
  font-size:13px;padding:11px 13px;border-radius:11px;margin-bottom:14px;display:none;animation:shake .4s}
.login-err.show{display:block}
.login-foot{text-align:center;margin-top:22px;font-size:11.5px;color:var(--muted-2);line-height:1.6}

/* ============ APP SHELL ============ */
#appView{min-height:100vh;display:flex;flex-direction:column}
.topbar{position:sticky;top:0;z-index:40;background:rgba(255,255,255,.86);
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:14px;padding:11px 18px}
.topbar .menu-btn{display:none;width:40px;height:40px;border-radius:11px;align-items:center;justify-content:center;color:var(--ink-soft)}
.topbar .menu-btn:hover{background:var(--surface-2)}
.brand-mini{display:flex;align-items:center;gap:10px;font-family:var(--display);font-weight:800;font-size:17px;color:var(--ink)}
.brand-mini .dot{width:30px;height:30px;border-radius:9px;background:var(--grad-emerald);display:grid;place-items:center;color:#fff;font-size:15px;box-shadow:var(--shadow-sm)}
.brand-mini span.x{background:linear-gradient(120deg,var(--emerald),var(--ice));-webkit-background-clip:text;background-clip:text;color:transparent}
.topbar-sp{flex:1}
.topbar .user-chip{display:flex;align-items:center;gap:10px;padding:6px 8px 6px 12px;border-radius:30px;background:var(--surface-2);border:1px solid var(--line)}
.topbar .user-chip .av{width:30px;height:30px;border-radius:50%;background:var(--grad-emerald);color:#fff;display:grid;place-items:center;font-weight:700;font-size:13px}
.topbar .user-chip .meta{line-height:1.15;text-align:right}
.topbar .user-chip .meta b{font-size:13px;display:block}
.topbar .user-chip .meta small{font-size:10.5px;color:var(--muted)}
.role-tag{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;padding:2px 8px;border-radius:20px}
.role-tag.admin{background:rgba(199,154,60,.18);color:var(--gold-d)}
.role-tag.seguridad{background:rgba(29,111,184,.15);color:var(--ice-d)}

.shell{flex:1;display:flex;max-width:1600px;width:100%;margin:0 auto}
.sidebar{width:248px;flex-shrink:0;padding:20px 14px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
.sidebar .sec-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--muted-2);margin:14px 12px 8px}
.nav-item{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:12px;color:var(--ink-soft);
  font-weight:500;font-size:14px;transition:.2s;width:100%;text-align:left;margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--surface);color:var(--ink)}
.nav-item.active{background:var(--surface);color:var(--emerald-d);font-weight:600;box-shadow:var(--shadow-sm)}
.nav-item.active::before{content:'';position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:4px;height:22px;border-radius:4px;background:var(--grad-emerald)}
.nav-item .ni-ico{width:20px;height:20px;flex-shrink:0;opacity:.85}
.nav-item.danger:hover{background:rgba(192,57,43,.08);color:var(--danger)}
.main{flex:1;min-width:0;padding:24px 26px 80px}

.backdrop{position:fixed;inset:0;background:rgba(16,35,27,.45);z-index:45;display:none;opacity:0;transition:opacity .3s}
.backdrop.show{display:block;opacity:1}

/* ============ HEADER de sección ============ */
.page-head{margin-bottom:22px;animation:floatUp .5s both}
.page-head h2{font-family:var(--display);font-size:24px;font-weight:800;letter-spacing:-.5px;display:flex;align-items:center;gap:11px}
.live-badge{display:inline-flex;align-items:center;gap:6px;font-family:var(--font);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--emerald-d);background:rgba(22,160,106,.12);border:1px solid rgba(22,160,106,.28);padding:3px 10px 3px 8px;border-radius:20px}
.live-badge .live-dot{width:8px;height:8px;border-radius:50%;background:var(--emerald-l);box-shadow:0 0 0 0 rgba(22,160,106,.6);animation:livethrob 2s infinite}
@keyframes livethrob{0%{box-shadow:0 0 0 0 rgba(22,160,106,.55)}70%{box-shadow:0 0 0 7px rgba(22,160,106,0)}100%{box-shadow:0 0 0 0 rgba(22,160,106,0)}}
.live-badge.pulse-live{animation:liveflash .7s ease}
@keyframes liveflash{0%{background:rgba(22,160,106,.45);transform:scale(1.06)}100%{background:rgba(22,160,106,.12);transform:scale(1)}}
.page-head .code-badge{font-size:12px;font-weight:700;font-family:var(--font);background:var(--ink);color:#fff;padding:3px 9px;border-radius:7px;letter-spacing:.5px}
.page-head p{color:var(--muted);font-size:14px;margin-top:5px;max-width:680px;line-height:1.5}
.page-head .ph-logo{height:34px;object-fit:contain;margin-left:auto}
.page-head .ph-logos{margin-left:auto;display:flex;align-items:center;gap:10px}
.page-head .ph-logos img{height:34px;object-fit:contain}

/* ============ DASHBOARD CARDS ============ */
.grid-forms{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.form-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:20px;
  cursor:pointer;transition:transform .22s cubic-bezier(.2,.8,.2,1),box-shadow .22s,border-color .2s;
  position:relative;overflow:hidden;animation:floatUp .5s both}
.form-card::after{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent,var(--grad-emerald));transform:scaleX(0);transform-origin:left;transition:transform .3s}
.form-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--line-2)}
.form-card:hover::after{transform:scaleX(1)}
.fc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
.fc-icon{width:46px;height:46px;border-radius:13px;display:grid;place-items:center;color:#fff;flex-shrink:0;box-shadow:var(--shadow-sm)}
.fc-code{font-size:11px;font-weight:700;color:var(--muted);letter-spacing:.4px;background:var(--surface-2);padding:4px 9px;border-radius:7px;border:1px solid var(--line)}
.form-card h3{font-family:var(--display);font-size:16px;font-weight:700;line-height:1.3;margin-bottom:6px}
.form-card .fc-desc{font-size:13px;color:var(--muted);line-height:1.45;margin-bottom:16px;min-height:38px}
.fc-foot{display:flex;align-items:center;justify-content:space-between;padding-top:14px;border-top:1px solid var(--line)}
.fc-foot .count{font-size:13px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:6px}
.fc-foot .count b{color:var(--emerald-d)}
.fc-foot .go{font-size:13px;color:var(--emerald);font-weight:600;display:flex;align-items:center;gap:5px;transition:gap .2s}
.form-card:hover .fc-foot .go{gap:9px}
.fc-emp{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:2px}
.fc-emp.byc{background:rgba(13,122,79,.1);color:var(--emerald-d)}
.fc-emp.bc{background:rgba(29,111,184,.12);color:var(--ice-d)}
.fc-emp.dual{background:var(--surface-2);color:var(--ink-soft);border:1px solid var(--line);padding:3px 9px 3px 5px}
.fc-emp.dual img{height:15px;width:auto;object-fit:contain}

/* ============ STAT STRIP ============ */
.stat-strip{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px;margin-bottom:24px}
.stat{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-s);padding:16px 18px;animation:floatUp .5s both}
.stat .sv{font-family:var(--display);font-size:28px;font-weight:800;line-height:1;background:linear-gradient(120deg,var(--emerald),var(--ice));-webkit-background-clip:text;background-clip:text;color:transparent}
.stat .sl{font-size:12.5px;color:var(--muted);margin-top:7px;font-weight:500}

/* ============ TABLE / LISTA REGISTROS ============ */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
.search-box{position:relative;flex:1;min-width:200px;max-width:380px}
.search-box .ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--muted-2)}
.search-box input{width:100%;padding:11px 14px 11px 40px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);outline:none;transition:.2s;font-size:14px}
.search-box input:focus{border-color:var(--emerald-l);box-shadow:0 0 0 4px rgba(22,160,106,.1)}
.btn{display:inline-flex;align-items:center;gap:8px;padding:11px 16px;border-radius:11px;font-weight:600;font-size:14px;transition:.18s;white-space:nowrap}
.btn.solid{background:var(--grad-emerald);color:#fff;box-shadow:0 8px 20px -8px rgba(13,122,79,.6)}
.btn.solid:hover{transform:translateY(-2px);box-shadow:0 12px 24px -8px rgba(13,122,79,.7)}
.btn.ghost{background:var(--surface);border:1.5px solid var(--line);color:var(--ink-soft)}
.btn.ghost:hover{border-color:var(--line-2);background:var(--surface-2)}
.btn.gold{background:var(--grad-gold);color:#4a3608;box-shadow:0 8px 20px -8px rgba(199,154,60,.6)}
.btn.gold:hover{transform:translateY(-2px)}
.btn.danger{background:var(--danger);color:#fff}
.btn.danger:hover{background:var(--danger-d)}
.btn.sm{padding:8px 12px;font-size:13px}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important}

.table-wrap{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow-x:auto;overflow-y:hidden;box-shadow:var(--shadow-sm);-webkit-overflow-scrolling:touch}
.table-wrap .tbl{min-width:680px}
.tbl{width:100%;border-collapse:collapse;font-size:13.5px}
.tbl thead th{background:var(--surface-2);text-align:left;padding:13px 16px;font-weight:700;color:var(--ink-soft);font-size:12px;text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--line);white-space:nowrap;position:sticky;top:0}
.tbl tbody td{padding:13px 16px;border-bottom:1px solid var(--line);color:var(--ink-soft);vertical-align:middle}
.tbl tbody tr{transition:background .15s;animation:slideRight .4s both}
.tbl tbody tr:hover{background:var(--surface-2)}
.tbl tbody tr:last-child td{border-bottom:none}
.consec{font-family:var(--display);font-weight:700;font-size:12.5px;color:var(--emerald-d);background:rgba(13,122,79,.08);padding:3px 8px;border-radius:7px;white-space:nowrap}
.creator-tag{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:var(--ink-soft);background:var(--surface-2);border:1px solid var(--line);padding:3px 9px 3px 4px;border-radius:20px;white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis}
.creator-tag .ct-av{width:20px;height:20px;border-radius:50%;background:var(--grad-ice);color:#fff;display:inline-grid;place-items:center;font-size:9.5px;font-weight:700;flex-shrink:0}
.row-actions{display:flex;gap:6px;justify-content:flex-end;flex-wrap:nowrap;white-space:nowrap}
.icon-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--muted);transition:.18s;border:1px solid transparent}
.icon-btn:hover{background:var(--surface-2);color:var(--ink);border-color:var(--line)}
.icon-btn.edit:hover{color:var(--ice-d);border-color:rgba(29,111,184,.3)}
.icon-btn.pdf:hover{color:var(--gold-d);border-color:rgba(199,154,60,.4)}
.icon-btn.del:hover{color:var(--danger);border-color:rgba(192,57,43,.3)}
.badge-st{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;text-transform:uppercase;letter-spacing:.3px}
.badge-st.complete{background:rgba(31,157,99,.14);color:var(--ok)}
.badge-st.partial{background:rgba(217,138,31,.15);color:var(--warn)}

.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-state .es-ico{width:72px;height:72px;border-radius:20px;background:var(--surface-2);display:grid;place-items:center;margin:0 auto 18px;color:var(--muted-2)}
.empty-state h3{font-family:var(--display);font-size:18px;color:var(--ink-soft);margin-bottom:6px}
.empty-state p{font-size:14px;max-width:360px;margin:0 auto 18px}

/* ============ MODAL / FORM EDITOR ============ */
.modal-bg{position:fixed;inset:0;background:rgba(16,35,27,.55);backdrop-filter:blur(4px);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
.modal-bg.show{display:flex;animation:fadeIn .25s}
.modal{background:var(--bg);border-radius:24px;width:100%;max-width:760px;margin:auto;box-shadow:0 40px 100px -20px rgba(8,40,26,.6);animation:scaleIn .35s cubic-bezier(.2,.9,.2,1) both;overflow:hidden}
.modal.wide{max-width:920px}
.modal.narrow{max-width:480px}
.modal-head{display:flex;align-items:center;gap:14px;padding:20px 24px;background:var(--surface);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:2}
.modal-head .mh-ico{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#fff;flex-shrink:0}
.modal-head h3{font-family:var(--display);font-size:18px;font-weight:700;line-height:1.2}
.modal-head .mh-sub{font-size:12.5px;color:var(--muted);margin-top:2px}
.modal-head .close{margin-left:auto;width:38px;height:38px;border-radius:11px;display:grid;place-items:center;color:var(--muted);transition:.18s}
.modal-head .close:hover{background:var(--surface-2);color:var(--danger)}
.modal-body{padding:24px;max-height:calc(100vh - 220px);overflow-y:auto}
.modal-foot{padding:16px 24px;background:var(--surface);border-top:1px solid var(--line);display:flex;gap:12px;justify-content:flex-end;position:sticky;bottom:0}

.consec-banner{display:flex;align-items:center;gap:12px;background:var(--grad-emerald);color:#fff;padding:14px 18px;border-radius:14px;margin-bottom:22px;box-shadow:var(--shadow-sm)}
.consec-banner .cb-ico{width:38px;height:38px;border-radius:11px;background:rgba(255,255,255,.2);display:grid;place-items:center}
.consec-banner .cb-t{font-size:11.5px;opacity:.85;text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.consec-banner .cb-v{font-family:var(--display);font-weight:800;font-size:19px;letter-spacing:.5px}

.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
.fg-full{grid-column:1/-1}
.ff{display:flex;flex-direction:column}
.ff label{font-size:12.5px;font-weight:600;color:var(--ink-soft);margin-bottom:7px;display:flex;align-items:center;gap:6px}
.ff label .req{color:var(--danger)}
.ff label .locked{font-size:10px;color:var(--muted-2);display:inline-flex;align-items:center;gap:3px;background:var(--surface-2);padding:1px 6px;border-radius:5px;font-weight:600}
.ff input,.ff select,.ff textarea{width:100%;padding:11px 13px;border:1.5px solid var(--line);border-radius:11px;background:var(--surface);outline:none;transition:.2s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--emerald-l);box-shadow:0 0 0 4px rgba(22,160,106,.1)}
.ff input:disabled,.ff textarea:disabled,.ff select:disabled{background:var(--surface-2);color:var(--muted);cursor:not-allowed;border-style:dashed}
.ff textarea{resize:vertical;min-height:80px}
.ff .hint{font-size:11px;color:var(--muted-2);margin-top:5px}

.section-title{font-family:var(--display);font-size:14px;font-weight:700;color:var(--ink-soft);margin:24px 0 12px;padding-bottom:8px;border-bottom:2px solid var(--line);grid-column:1/-1;display:flex;align-items:center;gap:8px}
.section-title:first-child{margin-top:0}

/* Toggle Sí/No */
.toggle-row{display:flex;gap:8px}
.toggle-opt{flex:1;padding:10px;border:1.5px solid var(--line);border-radius:10px;text-align:center;font-weight:600;font-size:13.5px;color:var(--muted);transition:.18s;background:var(--surface)}
.toggle-opt:hover{border-color:var(--line-2)}
.toggle-opt.on-yes{background:rgba(31,157,99,.12);border-color:var(--ok);color:var(--ok)}
.toggle-opt.on-no{background:rgba(192,57,43,.1);border-color:var(--danger);color:var(--danger-d)}
.toggle-opt:disabled{opacity:.5;cursor:not-allowed}

/* ============ FIRMA (signature pad) ============ */
.sig-field{grid-column:1/-1}
.sig-box{border:1.5px dashed var(--line-2);border-radius:14px;background:var(--surface);position:relative;overflow:hidden;transition:.2s}
.sig-box.signed{border-style:solid;border-color:var(--emerald-l);background:var(--surface-2)}
.sig-box canvas{display:block;width:100%;height:150px;touch-action:none;cursor:crosshair;border-radius:13px}
.sig-box .sig-placeholder{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted-2);pointer-events:none;font-size:13px}
.sig-box.signed .sig-placeholder{display:none}
.sig-actions{display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.sig-actions .sig-status{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:5px}
.sig-actions .sig-status.ok{color:var(--ok);font-weight:600}
.sig-clear{font-size:12.5px;color:var(--danger);font-weight:600;display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:8px;transition:.15s}
.sig-clear:hover{background:rgba(192,57,43,.08)}
.sig-locked-img{width:100%;height:150px;object-fit:contain;background:var(--surface-2);border-radius:13px;border:1.5px solid var(--line)}

/* dynamic rows (sub-tablas: incidentes, fumigación areas, inspección) */
.subtable{grid-column:1/-1;border:1px solid var(--line);border-radius:14px;overflow:hidden}
.subtable-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface-2);border-bottom:1px solid var(--line)}
.subtable-head h4{font-family:var(--display);font-size:13.5px;font-weight:700;color:var(--ink-soft)}
.sub-rows{padding:8px}
.sub-row{display:grid;gap:8px;padding:10px;border-radius:10px;background:var(--surface);margin-bottom:8px;border:1px solid var(--line);align-items:end}
.sub-row .ff label{font-size:11px}
.sub-row .ff input,.sub-row .ff select{padding:9px 11px;font-size:13px}
.sub-row .rm-row{width:36px;height:38px;border-radius:9px;background:rgba(192,57,43,.08);color:var(--danger);display:grid;place-items:center;align-self:end}
.sub-row .rm-row:hover{background:rgba(192,57,43,.16)}
.add-row{display:inline-flex;align-items:center;gap:7px;margin:4px 8px 10px;padding:9px 14px;border-radius:10px;border:1.5px dashed var(--emerald-l);color:var(--emerald-d);font-weight:600;font-size:13px;transition:.18s}
.add-row:hover{background:rgba(22,160,106,.07)}

/* checklist rows (inspección camiones / fumigación) */
.check-grid{grid-column:1/-1;display:flex;flex-direction:column;gap:8px}
.check-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--line);border-radius:11px;transition:.15s}
.check-item:hover{border-color:var(--line-2)}
.check-item .ci-label{flex:1;font-size:13.5px;font-weight:500}
.check-item .ci-num{width:24px;height:24px;border-radius:7px;background:var(--surface-2);display:grid;place-items:center;font-size:11px;font-weight:700;color:var(--muted);flex-shrink:0}

/* ============ USERS / ADMIN ============ */
.user-card{display:flex;align-items:center;gap:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:14px;margin-bottom:10px;transition:.18s;animation:slideRight .4s both}
.user-card:hover{border-color:var(--line-2);box-shadow:var(--shadow-sm)}
.user-card .uc-av{width:44px;height:44px;border-radius:12px;display:grid;place-items:center;color:#fff;font-weight:700;font-size:16px;flex-shrink:0}
.user-card .uc-info{flex:1;min-width:0}
.user-card .uc-info b{font-size:15px;display:block}
.user-card .uc-info small{font-size:12.5px;color:var(--muted)}
.user-card .uc-actions{display:flex;gap:7px}

/* toast */
.toast-wrap{position:fixed;bottom:24px;right:24px;z-index:90;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:12px;background:var(--ink);color:#fff;padding:14px 18px;border-radius:13px;box-shadow:0 16px 40px -12px rgba(0,0,0,.5);animation:slideRight .35s cubic-bezier(.2,.9,.2,1) both;min-width:260px;max-width:380px;font-size:14px;font-weight:500}
.toast.ok{background:linear-gradient(120deg,#0d7a4f,#16a06a)}
.toast.err{background:linear-gradient(120deg,#a82c20,#c0392b)}
.toast.warn{background:linear-gradient(120deg,#b8761a,#d98a1f)}
.toast .t-ico{flex-shrink:0}

/* confirm dialog */
.confirm-ico{width:56px;height:56px;border-radius:16px;display:grid;place-items:center;margin:0 auto 16px;background:rgba(192,57,43,.1);color:var(--danger)}
.confirm-body{text-align:center;padding:8px 8px 4px}
.confirm-body h3{font-family:var(--display);font-size:19px;margin-bottom:8px}
.confirm-body p{color:var(--muted);font-size:14px;line-height:1.5}

/* ============ RESPONSIVE ============ */
@media(max-width:920px){
  .topbar .menu-btn{display:flex}
  .sidebar{position:fixed;left:0;top:0;height:100vh;z-index:50;background:var(--surface);box-shadow:0 0 60px rgba(0,0,0,.2);transform:translateX(-110%);transition:transform .35s cubic-bezier(.2,.8,.2,1);padding-top:18px;width:270px}
  .sidebar.open{transform:translateX(0)}
  .sidebar-logo{display:flex;align-items:center;gap:10px;padding:8px 14px 18px;border-bottom:1px solid var(--line);margin-bottom:8px}
  .main{padding:18px 16px 80px}
  .form-grid{grid-template-columns:1fr}
  .topbar .user-chip .meta{display:none}
}
@media(min-width:921px){.sidebar-logo{display:none}}
@media(max-width:560px){
  .login-card{padding:32px 22px 26px}
  .page-head h2{font-size:20px}
  .page-head .ph-logo,.page-head .ph-logos{display:none}
  .modal-bg{padding:0}
  .modal{border-radius:20px 20px 0 0;max-width:100%;margin-top:auto;min-height:50vh}
  .modal.narrow{border-radius:20px;margin:auto 12px}
  .stat .sv{font-size:23px}
  .table-wrap{border-radius:14px}
  .tbl{font-size:12.5px}
  .tbl thead th,.tbl tbody td{padding:10px 11px}
  .hide-sm{display:none}
  .toast-wrap{left:12px;right:12px;bottom:12px}
  .toast{min-width:0}
}
.fade-list>*{animation:floatUp .45s both}
.fade-list>*:nth-child(1){animation-delay:.02s}
.fade-list>*:nth-child(2){animation-delay:.06s}
.fade-list>*:nth-child(3){animation-delay:.1s}
.fade-list>*:nth-child(4){animation-delay:.14s}
.fade-list>*:nth-child(5){animation-delay:.18s}
.fade-list>*:nth-child(6){animation-delay:.22s}
.fade-list>*:nth-child(7){animation-delay:.26s}
.fade-list>*:nth-child(8){animation-delay:.3s}
.fade-list>*:nth-child(9){animation-delay:.34s}

/* full-screen loader inicial */
#bootLoader{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;transition:opacity .5s}
#bootLoader.hide{opacity:0;pointer-events:none}
#bootLoader .boot-ring{position:relative;width:90px;height:90px}
#bootLoader .boot-ring .r{position:absolute;inset:0;border-radius:50%;border:3px solid var(--emerald-l)}
#bootLoader .boot-ring .r:nth-child(1){animation:ring 1.8s ease-out infinite}
#bootLoader .boot-ring .r:nth-child(2){animation:ring 1.8s ease-out .6s infinite}
#bootLoader .boot-ring .r:nth-child(3){animation:ring 1.8s ease-out 1.2s infinite}
#bootLoader .boot-core{position:absolute;inset:0;display:grid;place-items:center}
#bootLoader .boot-core .dot{width:48px;height:48px;border-radius:14px;background:var(--grad-emerald);display:grid;place-items:center;color:#fff;font-family:var(--display);font-weight:800;font-size:22px;box-shadow:var(--shadow)}
#bootLoader p{font-family:var(--display);font-weight:600;color:var(--ink-soft);letter-spacing:.3px;animation:pulse 1.6s infinite}
</style>
</head>

const fmtDate = iso => { if(!iso) return "—"; const [y,m,d]=String(iso).split("-"); return d&&m&&y?`${d}/${m}/${y}`:iso; };
const fmt12h = hm => { if(!hm) return ""; const p=String(hm).split(":"); if(p.length<2) return hm; let h=parseInt(p[0],10); const mm=p[1]; if(isNaN(h)) return hm; const ap=h>=12?"p.m.":"a.m."; h=h%12; if(h===0)h=12; return `${h}:${mm} ${ap}`; };
const initials = n => (n||"?").trim().split(/\s+/).slice(0,2).map(w=>w[0]).join("").toUpperCase();

/* Hash simple para contraseñas (SHA-256). No es alta seguridad pero
   evita guardar texto plano en Firestore para uso interno.            */
async function hashPwd(str){
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

/* Toasts */
function toast(msg, type="ok", ms=3200){
  const t = el("div", "toast "+type);
  const ico = type==="ok"?ICON.check:type==="err"?ICON.alert:type==="warn"?ICON.warn:ICON.info;
  t.innerHTML = `<span class="t-ico">${ico}</span><span>${esc(msg)}</span>`;
  $("#toastWrap").appendChild(t);
  setTimeout(()=>{ t.style.animation="fadeIn .3s reverse forwards"; setTimeout(()=>t.remove(),320); }, ms);
}

<script>
/* ======================================================================
   DATA LAYER — Firestore con respaldo en modo DEMO (sin config)
   ====================================================================== */
const LS_KEY = "secudocs_demo_v1";
function demoLoad(){ try{ const d=JSON.parse(localStorage.getItem(LS_KEY)); if(d) state.demoStore=d; }catch(e){} }
function demoSave(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state.demoStore)); }catch(e){} }

/* ---- Usuarios ---- */
async function dbGetUserByName(usuario){
  if(state.demo){ return state.demoStore.users.find(u=>u.usuario.toLowerCase()===usuario.toLowerCase())||null; }
  const snap = await db.collection(COL_USERS).where("usuario","==",usuario.toLowerCase()).limit(1).get();
  if(snap.empty) return null;
  const d=snap.docs[0]; return {id:d.id, ...d.data()};
}
async function dbListUsers(){
  if(state.demo){ return [...state.demoStore.users]; }
  const snap = await db.collection(COL_USERS).orderBy("nombre").get();
  return snap.docs.map(d=>({id:d.id, ...d.data()}));
}
async function dbCreateUser(u){
  if(state.demo){ u.id="u_"+Date.now(); state.demoStore.users.push(u); demoSave(); return u; }
  const ref = await db.collection(COL_USERS).add(u);
  return {id:ref.id, ...u};
}
async function dbUpdateUser(id, patch){
  if(state.demo){ const u=state.demoStore.users.find(x=>x.id===id); Object.assign(u,patch); demoSave(); return; }
  await db.collection(COL_USERS).doc(id).update(patch);
}
async function dbDeleteUser(id){
  if(state.demo){ state.demoStore.users=state.demoStore.users.filter(x=>x.id!==id); demoSave(); return; }
  await db.collection(COL_USERS).doc(id).delete();
}
/* Construye el mapa username -> nombre para la etiqueta "Creado por" */
async function loadUserMap(){
  const list = await dbListUsers();
  const map = {};
  list.forEach(u=>{ map[u.usuario] = u.nombre || u.usuario; });
  state.userMap = map;
}

/* ---- Consecutivos (transacción atómica por formulario+año) ---- */
async function nextConsecutivo(formCode){
  const year = new Date().getFullYear();
  const cid = `${formCode}_${year}`;
  if(state.demo){
    const n = (state.demoStore.counters[cid]||0)+1;
    state.demoStore.counters[cid]=n; demoSave();
    return `${formCode}-${year}-${String(n).padStart(4,"0")}`;
  }
  const ref = db.collection(COL_COUNTERS).doc(cid);
  const n = await db.runTransaction(async tx=>{
    const doc = await tx.get(ref);
    const cur = doc.exists ? (doc.data().value||0) : 0;
    const nv = cur+1;
    tx.set(ref,{value:nv, formCode, year}, {merge:true});
    return nv;
  });
  return `${formCode}-${year}-${String(n).padStart(4,"0")}`;
}

/* ---- Registros ---- */
/* Visibilidad: el admin ve todos los registros; el rol "seguridad"
   solo ve los que él mismo creó (campo creadoPor). */
function visibleForUser(rec){
  if(!state.user) return false;
  if(state.user.rol==="admin") return true;
  return rec.creadoPor === state.user.usuario;
}

async function dbListRecords(formId){
  if(state.demo){ return state.demoStore.records.filter(r=>r.formId===formId).filter(visibleForUser).sort((a,b)=>(b.consecutivo>a.consecutivo?1:-1)); }
  const snap = await db.collection(COL_RECORDS).where("formId","==",formId).get();
  const arr = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(visibleForUser);
  arr.sort((a,b)=> (b.consecutivo||"").localeCompare(a.consecutivo||""));
  return arr;
}
async function dbCreateRecord(rec){
  if(state.demo){ rec.id="r_"+Date.now(); state.demoStore.records.unshift(rec); demoSave(); return rec; }
  const ref = await db.collection(COL_RECORDS).add(rec);
  return {id:ref.id, ...rec};
}
async function dbUpdateRecord(id, patch){
  if(state.demo){ const r=state.demoStore.records.find(x=>x.id===id); Object.assign(r,patch); demoSave(); return; }
  await db.collection(COL_RECORDS).doc(id).update(patch);
}
async function dbDeleteRecord(id){
  if(state.demo){ state.demoStore.records=state.demoStore.records.filter(x=>x.id!==id); demoSave(); return; }
  await db.collection(COL_RECORDS).doc(id).delete();
}
async function dbCountByForm(){
  const counts={};
  if(state.demo){ state.demoStore.records.filter(visibleForUser).forEach(r=>counts[r.formId]=(counts[r.formId]||0)+1); return counts; }
  const snap = await db.collection(COL_RECORDS).get();
  snap.docs.map(d=>({id:d.id, ...d.data()})).filter(visibleForUser).forEach(r=>{ counts[r.formId]=(counts[r.formId]||0)+1; });
  return counts;
}

/* ======================================================================
   TIEMPO REAL (onSnapshot) — la pantalla se actualiza sola cuando otro
   usuario guarda, edita o elimina. En modo demo no aplica (un solo
   dispositivo); ahí refrescamos tras cada acción propia.
   ====================================================================== */
function subscribeRecords(formId, onChange){
  if(state.demo) return null;
  return db.collection(COL_RECORDS).where("formId","==",formId)
    .onSnapshot(snap=>{
      const arr = snap.docs.map(d=>({id:d.id, ...d.data()})).filter(visibleForUser);
      arr.sort((a,b)=> (b.consecutivo||"").localeCompare(a.consecutivo||""));
      onChange(arr);
    }, err=>{ console.warn("onSnapshot registros:", err); });
}
function subscribeCounts(onChange){
  if(state.demo) return null;
  return db.collection(COL_RECORDS)
    .onSnapshot(snap=>{
      const counts={};
      snap.docs.map(d=>({id:d.id, ...d.data()})).filter(visibleForUser).forEach(r=>{ counts[r.formId]=(counts[r.formId]||0)+1; });
      onChange(counts);
    }, err=>{ console.warn("onSnapshot conteos:", err); });
}
function subscribeUsers(onChange){
  if(state.demo) return null;
  return db.collection(COL_USERS).orderBy("nombre")
    .onSnapshot(snap=>{
      onChange(snap.docs.map(d=>({id:d.id, ...d.data()})));
    }, err=>{ console.warn("onSnapshot usuarios:", err); });
}

/* ======================================================================
   COMPLETITUD — un registro está "completo" si todos los campos
   requeridos + firmas tienen valor.
   ====================================================================== */
function recordIsComplete(form, data){
  for(const f of form.fields){
    if(f.sec || f.type==="checklist" || f.type==="repeater") continue;
    if(f.req){
      const v = data[f.k];
      if(v==null || v==="" ) return false;
    }
    if(f.type==="signature" && f.req && !data[f.k]) return false;
  }
  return true;
}
function missingFields(form, data){
  return form.fields.filter(f=>!f.sec && f.req && (data[f.k]==null || data[f.k]===""));
}

/* ======================================================================
   SESIÓN
   ====================================================================== */
const SESSION_KEY="secudocs_session";
function saveSession(u){ try{ sessionStorage.setItem(SESSION_KEY, JSON.stringify(u)); }catch(e){} }
function loadSession(){ try{ return JSON.parse(sessionStorage.getItem(SESSION_KEY)); }catch(e){ return null; } }
function clearSession(){ try{ sessionStorage.removeItem(SESSION_KEY); }catch(e){} }

/* Bootstrap: si no hay usuarios (modo demo o primer arranque), crea admin
   por defecto admin / admin123  */
async function ensureSeedAdmin(){
  const users = await dbListUsers();
  if(users.length===0){
    await dbCreateUser({
      usuario:"admin", nombre:"Administrador", rol:"admin",
      pwd: await hashPwd("admin123"), creado: todayISO()
    });
    return true;
  }
  return false;
}

/* ======================================================================
   RENDER: LOGIN
   ====================================================================== */
function renderLogin(){
  const root = $("#app");
  root.innerHTML = `
  <div id="loginView" class="view active">
    <div class="login-bg"><div class="blob b1"></div><div class="blob b2"></div><div class="blob b3"></div></div>
    <div class="login-card">
      <div class="login-logos">
        <img src="${LOGOS.byc}" alt="B&C Exportadores">
        <div class="sep"></div>
        <img src="${LOGOS.bc}" alt="Bajo Cero">
      </div>
      <div class="login-brand">
        <h1>SecuDocs</h1>
        <p>Digitalización de Documentos de Seguridad</p>
      </div>
      <div class="login-err" id="loginErr"></div>
      <div class="field">
        <label>Usuario</label>
        <span class="ico">${ICON.user}</span>
        <input class="inp" id="loginUser" placeholder="usuario" autocomplete="username" autocapitalize="none">
      </div>
      <div class="field">
        <label>Contraseña</label>
        <span class="ico">${ICON.lock}</span>
        <input class="inp" id="loginPwd" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="btn-primary" id="loginBtn">
        <span class="lbl"><span id="loginLbl">Ingresar</span>${ICON.arrow}</span>
      </button>
      <div class="login-foot">
        ${state.demo?'<b>Modo demostración</b> · datos en este dispositivo<br>':''}
        B&C Exportadores del Valle de Ujarrás · Bajo Cero
      </div>
    </div>
  </div>`;
  const doLogin = ()=>attemptLogin();
  $("#loginBtn").onclick = doLogin;
  $("#loginPwd").addEventListener("keydown",e=>{ if(e.key==="Enter") doLogin(); });
  $("#loginUser").addEventListener("keydown",e=>{ if(e.key==="Enter") $("#loginPwd").focus(); });
  $("#loginUser").focus();
}

async function attemptLogin(){
  const u = $("#loginUser").value.trim();
  const p = $("#loginPwd").value;
  const errBox = $("#loginErr");
  errBox.classList.remove("show");
  if(!u || !p){ showLoginErr("Ingresá usuario y contraseña."); return; }
  const btn=$("#loginBtn"), lbl=$("#loginLbl");
  btn.disabled=true; lbl.innerHTML='<span class="spinner sm" style="border-top-color:#fff;border-color:rgba(255,255,255,.4)"></span> Verificando…';
  try{
    const user = await dbGetUserByName(u);
    const hash = await hashPwd(p);
    if(!user || user.pwd!==hash){
      btn.disabled=false; lbl.textContent="Ingresar";
      showLoginErr("Usuario o contraseña incorrectos.");
      return;
    }
    state.user = {id:user.id, usuario:user.usuario, nombre:user.nombre, rol:user.rol};
    saveSession(state.user);
    await new Promise(r=>setTimeout(r,350)); // micro-transición
    renderApp();
    toast(`Bienvenido, ${user.nombre.split(" ")[0]}`, "ok");
  }catch(e){
    console.error(e);
    btn.disabled=false; lbl.textContent="Ingresar";
    showLoginErr("Error de conexión. Revisá la configuración de Firebase.");
  }
}
function showLoginErr(m){ const b=$("#loginErr"); b.textContent=m; b.classList.add("show"); }
</script>
